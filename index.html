<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zeynebin 90 Günlük TYT Macerası ❤️</title>

<link rel="manifest" href="manifest.json">

<script src="schedule.js"></script>
<script src="questions.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
padding:20px;
text-align:center;
}

h1{
color:#ff4d6d;
}

.dayNav{
display:flex;
overflow-x:auto;
gap:6px;
margin-bottom:20px;
}

.dayBtn{
padding:8px;
border:none;
border-radius:8px;
background:#ddd;
cursor:pointer;
min-width:40px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:20px;
}

.question{
text-align:left;
margin:15px 0;
padding:10px;
background:#fafafa;
border-radius:8px;
}

.option{
display:block;
margin:5px 0;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#6c5ce7;
color:white;
cursor:pointer;
margin-top:10px;
}

#loveModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#ff4d6d;
color:white;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-size:26px;
z-index:999;
}

</style>

</head>

<body>

<div id="loveModal">

<h2>Seni seviyorum sevgilim ❤️</h2>
<button onclick="startApp()">Başla</button>

</div>

<h1>Zeynebin TYT Macerası</h1>

<div class="dayNav" id="dayNav"></div>

<div class="card" id="content">
Bir gün seç
</div>

<script>

function startApp(){

document.getElementById("loveModal").style.display="none"

}

const nav=document.getElementById("dayNav")

for(let i=1;i<=30;i++){

const b=document.createElement("button")

b.className="dayBtn"

b.innerText=i

b.onclick=()=>loadDay(i)

nav.appendChild(b)

}

function loadDay(day){

const today=schedule[day]

const dersler=today.dersler

let html="<h2>"+day+". Gün</h2>"

let selectedQuestions=[]

dersler.forEach(d=>{

const qList=questionBank[d]

for(let i=0;i<3;i++){

selectedQuestions.push(qList[Math.floor(Math.random()*qList.length)])

}

})

selectedQuestions.forEach((q,i)=>{

html+=`

<div class="question">

<b>${i+1}. ${q.q}</b>

<label class="option">
<input type="radio" name="q${i}" value="a"> A) ${q.a}
</label>

<label class="option">
<input type="radio" name="q${i}" value="b"> B) ${q.b}
</label>

<label class="option">
<input type="radio" name="q${i}" value="c"> C) ${q.c}
</label>

<label class="option">
<input type="radio" name="q${i}" value="d"> D) ${q.d}
</label>

</div>

`

})

html+=`<button onclick="finishTest(${selectedQuestions.length})">Testi Bitir</button>`

document.getElementById("content").innerHTML=html

window.currentQuestions=selectedQuestions

}

function finishTest(total){

let correct=0

currentQuestions.forEach((q,i)=>{

let sel=document.querySelector('input[name="q'+i+'"]:checked')

if(sel && sel.value===q.ans){

correct++

}

})

let wrong=total-correct

alert("Doğru: "+correct+"  Yanlış: "+wrong)

}

if("serviceWorker" in navigator){

navigator.serviceWorker.register("sw.js")

}

</script>

</body>
</html>
