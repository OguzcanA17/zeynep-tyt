<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zeynebin TYT Macerası ❤️</title>

<link rel="manifest" href="manifest.json">

<script src="program.js"></script>
<script src="sorular.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
padding:20px;
text-align:center;
}

h1{
color:#ff4d6d;
}

.dayNav{
display:flex;
overflow-x:auto;
gap:6px;
margin-bottom:20px;
}

.dayBtn{
padding:8px;
border:none;
border-radius:8px;
background:#ddd;
cursor:pointer;
min-width:40px;
}

.dayDone{
background:#55efc4;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
margin-bottom:15px;
}

.question{
text-align:left;
margin:15px 0;
padding:10px;
background:#fafafa;
border-radius:8px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#6c5ce7;
color:white;
cursor:pointer;
margin-top:10px;
}

#loveModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#ff4d6d;
color:white;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-size:24px;
z-index:999;
}

</style>

</head>

<body>

<div id="loveModal">

<h2>Seni seviyorum sevgilim ❤️</h2>
<button onclick="startApp()">Başla</button>

</div>

<h1>Zeynebin TYT Macerası</h1>

<div class="dayNav" id="dayNav"></div>

<div id="content">
Bir gün seç
</div>

<script>

function startApp(){
document.getElementById("loveModal").style.display="none"
}

const nav=document.getElementById("dayNav")

for(let i=1;i<=30;i++){

let b=document.createElement("button")

b.className="dayBtn"

if(localStorage.getItem("day"+i)){
b.classList.add("dayDone")
}

b.innerText=i
b.onclick=()=>loadDay(i)

nav.appendChild(b)

}

function loadDay(day){

const today=schedule[day]

let html="<h2>"+day+". Gün</h2>"

today.lessons.forEach(l=>{

html+=`

<div class="card">

<h3>${l.ders}</h3>

<p>${l.konu}</p>

<a href="${l.video}" target="_blank">
📺 Konu videosu izle
</a>

</div>

`

})

html+=`<button onclick="startTest(${day})">Testi Başlat</button>`

document.getElementById("content").innerHTML=html

}

function startTest(day){

window.currentDay=day

const today=schedule[day]

let selectedQuestions=[]

today.lessons.forEach(l=>{

const qList=questionBank[l.ders]

for(let i=0;i<3;i++){

selectedQuestions.push(
qList[Math.floor(Math.random()*qList.length)]
)

}

})

let html="<h2>Test</h2>"

selectedQuestions.forEach((q,i)=>{

html+=`

<div class="question">

<b>${i+1}. ${q.q}</b>

<label>
<input type="radio" name="q${i}" value="a"> A) ${q.a}
</label><br>

<label>
<input type="radio" name="q${i}" value="b"> B) ${q.b}
</label><br>

<label>
<input type="radio" name="q${i}" value="c"> C) ${q.c}
</label><br>

<label>
<input type="radio" name="q${i}" value="d"> D) ${q.d}
</label>

</div>

`

})

html+=`<button onclick="finishTest(${selectedQuestions.length})">Testi Bitir</button>`

document.getElementById("content").innerHTML=html

window.currentQuestions=selectedQuestions

}

function finishTest(total){

let correct=0
let wrongQuestions=[]

currentQuestions.forEach((q,i)=>{

let sel=document.querySelector('input[name="q'+i+'"]:checked')

if(sel && sel.value===q.ans){

correct++

}else{

wrongQuestions.push(q)

}

})

let wrong=total-correct

let net=(correct - wrong*0.25).toFixed(2)

localStorage.setItem("day"+currentDay,"done")

document.querySelectorAll(".dayBtn")[currentDay-1].classList.add("dayDone")

let html=`

<h2>Test Sonucu</h2>

<p>Doğru: ${correct}</p>
<p>Yanlış: ${wrong}</p>
<p>Net: ${net}</p>

`

if(wrongQuestions.length>0){

html+=`<h3>Yanlış Yaptığın Sorular</h3>`

wrongQuestions.forEach((q,i)=>{

html+=`

<div class="question">

<b>${i+1}. ${q.q}</b>

<p>A) ${q.a}</p>
<p>B) ${q.b}</p>
<p>C) ${q.c}</p>
<p>D) ${q.d}</p>

<p style="color:green">
Doğru cevap: ${q.ans.toUpperCase()}
</p>

</div>

`

})

html+=`<button onclick="retryWrong()">Yanlış Soruları Tekrar Çöz</button>`

window.retryQuestions=wrongQuestions

}else{

html+=`<h3>Harika! Hiç yanlış yapmadın 🎉</h3>`

}

document.getElementById("content").innerHTML=html

}

function retryWrong(){

let html="<h2>Yanlış Sorular Tekrar Testi</h2>"

retryQuestions.forEach((q,i)=>{

html+=`

<div class="question">

<b>${i+1}. ${q.q}</b>

<label>
<input type="radio" name="rq${i}" value="a"> A) ${q.a}
</label><br>

<label>
<input type="radio" name="rq${i}" value="b"> B) ${q.b}
</label><br>

<label>
<input type="radio" name="rq${i}" value="c"> C) ${q.c}
</label><br>

<label>
<input type="radio" name="rq${i}" value="d"> D) ${q.d}
</label>

</div>

`

})

html+=`<button onclick="finishRetry(${retryQuestions.length})">Testi Bitir</button>`

document.getElementById("content").innerHTML=html

}

function finishRetry(total){

let correct=0

retryQuestions.forEach((q,i)=>{

let sel=document.querySelector('input[name="rq'+i+'"]:checked')

if(sel && sel.value===q.ans){
correct++
}

})

let wrong=total-correct

alert("Tekrar testi sonucu → Doğru: "+correct+" Yanlış: "+wrong)

}

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js")
}

</script>

</body>
</html>
