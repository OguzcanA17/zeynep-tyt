<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zeynebin 90 Günlük TYT Macerası ❤️</title>

<script src="schedule.js"></script>
<script src="questions.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6fb;
margin:0;
padding:20px;
text-align:center;
}

h1{
color:#ff4d6d;
}

.dayNav{
display:flex;
overflow-x:auto;
gap:6px;
margin-bottom:20px;
justify-content:center;
flex-wrap:wrap;
}

.dayBtn{
padding:10px;
border:none;
border-radius:8px;
background:#ddd;
cursor:pointer;
min-width:45px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
margin-bottom:15px;
}

.question{
text-align:left;
background:#fafafa;
padding:10px;
margin:10px 0;
border-radius:8px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#6c5ce7;
color:white;
cursor:pointer;
margin-top:10px;
}

#loveModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#ff4d6d;
color:white;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-size:26px;
z-index:999;
}

</style>

</head>

<body>

<div id="loveModal">

<h2>Seni seviyorum sevgilim ❤️</h2>
<button onclick="startApp()">Başla</button>

</div>

<h1>Zeynebin TYT Macerası</h1>

<div class="dayNav" id="dayNav"></div>

<div id="content">
Bir gün seç
</div>

<script>

function startApp(){
document.getElementById("loveModal").style.display="none"
}

const nav=document.getElementById("dayNav")

for(let i=1;i<=30;i++){

let b=document.createElement("button")

b.className="dayBtn"
b.innerText=i

b.onclick=()=>loadDay(i)

nav.appendChild(b)

}

function loadDay(day){

const today=schedule[day]

let html="<h2>"+day+". Gün</h2>"

today.lessons.forEach(l=>{

html+=`

<div class="card">

<h3>${l.ders}</h3>

<p>${l.konu}</p>

<a href="${l.video}" target="_blank">
📺 Konu videosu izle
</a>

</div>

`

})

html+=`<button onclick="startTest(${day})">Testi Başlat</button>`

document.getElementById("content").innerHTML=html

}

function startTest(day){

const today=schedule[day]

let selectedQuestions=[]

today.lessons.forEach(l=>{

const qList=questionBank[l.ders]

for(let i=0;i<3;i++){

selectedQuestions.push(
qList[Math.floor(Math.random()*qList.length)]
)

}

})

window.currentQuestions=selectedQuestions

let html="<h2>Test</h2>"

selectedQuestions.forEach((q,i)=>{

html+=`

<div class="question">

<b>${i+1}. ${q.q}</b><br>

<label><input type="radio" name="q${i}" value="a"> A) ${q.a}</label><br>
<label><input type="radio" name="q${i}" value="b"> B) ${q.b}</label><br>
<label><input type="radio" name="q${i}" value="c"> C) ${q.c}</label><br>
<label><input type="radio" name="q${i}" value="d"> D) ${q.d}</label>

</div>

`

})

html+=`<button onclick="finishTest()">Testi Bitir</button>`

document.getElementById("content").innerHTML=html

}

function finishTest(){

let correct=0
let wrongQuestions=[]

currentQuestions.forEach((q,i)=>{

let sel=document.querySelector('input[name="q'+i+'"]:checked')

if(sel && sel.value===q.ans){
correct++
}else{
wrongQuestions.push(q)
}

})

let wrong=currentQuestions.length-correct
let net=(correct - wrong*0.25).toFixed(2)

let html=`

<h2>Test Sonucu</h2>

<p>Doğru: ${correct}</p>
<p>Yanlış: ${wrong}</p>
<p>Net: ${net}</p>

`

if(wrongQuestions.length>0){

html+=`<h3>Yanlış Sorular</h3>`

wrongQuestions.forEach((q,i)=>{

html+=`

<div class="question">

<b>${i+1}. ${q.q}</b>

<p>A) ${q.a}</p>
<p>B) ${q.b}</p>
<p>C) ${q.c}</p>
<p>D) ${q.d}</p>

<p style="color:green">
Doğru cevap: ${q.ans.toUpperCase()}
</p>

</div>

`

})

}

document.getElementById("content").innerHTML=html

}

</script>

</body>
</html>
