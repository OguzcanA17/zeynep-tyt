<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeynebin TYT Macerası ❤️</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
padding:20px;
}

.dayNav{
display:flex;
overflow-x:auto;
gap:5px;
margin-bottom:15px;
}

.dayBtn{
padding:8px;
border:none;
background:#ddd;
border-radius:6px;
cursor:pointer;
min-width:35px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.question{
text-align:left;
margin:15px 0;
}

.option{
display:block;
margin:4px;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#ff7675;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<h1>❤️ Zeynebin TYT Macerası</h1>

<div class="dayNav" id="dayNav"></div>

<div class="card" id="content">
Gün seç
</div>

<script>

const questions=[

{
q:"Bir sayının %20'si 40 ise sayı kaçtır?",
a:"100",
b:"150",
c:"200",
d:"300",
ans:"c"
},

{
q:"Hücrenin yönetim merkezi nedir?",
a:"Mitokondri",
b:"Çekirdek",
c:"Ribozom",
d:"Lizozom",
ans:"b"
},

{
q:"Türkiye'nin başkenti neresidir?",
a:"İstanbul",
b:"Ankara",
c:"İzmir",
d:"Bursa",
ans:"b"
}

]

const nav=document.getElementById("dayNav")

for(let i=1;i<=90;i++){

const b=document.createElement("button")

b.className="dayBtn"
b.innerText=i

b.onclick=()=>loadDay(i)

nav.appendChild(b)

}

function loadDay(day){

let html=`<h2>${day}. Gün Testi</h2>`

questions.forEach((q,i)=>{

html+=`

<div class="question">

<b>${i+1}. ${q.q}</b>

<label class="option">
<input type="radio" name="q${i}" value="a"> A) ${q.a}
</label>

<label class="option">
<input type="radio" name="q${i}" value="b"> B) ${q.b}
</label>

<label class="option">
<input type="radio" name="q${i}" value="c"> C) ${q.c}
</label>

<label class="option">
<input type="radio" name="q${i}" value="d"> D) ${q.d}
</label>

</div>

`

})

html+=`<button onclick="finishTest()">Testi Bitir</button>`

document.getElementById("content").innerHTML=html

}

function finishTest(){

let correct=0

questions.forEach((q,i)=>{

let sel=document.querySelector('input[name="q'+i+'"]:checked')

if(sel && sel.value===q.ans){

correct++

}

})

let wrong=questions.length-correct

alert("Doğru: "+correct+"  Yanlış: "+wrong)

}

</script>

</body>
</html>
